{% extends 'base.html' %}
{% block content %}

<h2>Registrar Acción - Incidente: {{incidente.titulo}}</h2>

{% if error %}
<div class="alert alert-danger" style="color: red; margin-bottom: 1rem;">
    {{ error }}
</div>
{% endif %}

<form method="POST" action="{% url 'agregar_accion_incidente' incidente.id %}" class="custom-form">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="titulo">Título de la Acción</label>
        <input type="text" name="titulo" id="titulo" class="form-control" required>
    </div>

    <div class="form-group">
        <label for="tipo">Categoría de Acción</label>
        <select name="tipo" id="tipo" required class="form-control">
            <option value="">-- Seleccione Categoría --</option>
            {% for t in tipos_accion %}
            <option value="{{ t }}">{{ t|capfirst }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label for="analista">Analista Responsable</label>
        <select name="analista" id="analista" required class="form-control">
            <option value="">-- Seleccione Analista --</option>
            {% for a in analistas %}
            <option value="{{ a.id }}">{{ a.nombre }} ({{a.rol}})</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="descripcion">Descripción Detallada</label>
        <textarea name="descripcion" id="descripcion" rows="4" class="form-control" required></textarea>
    </div>

    <div class="button-group" style="margin-top: 1rem;">
        <button type="submit" class="btn btn-primary">Registrar Acción</button>
        <a href="{% url 'detalle_incidente' incidente.id %}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>

{% endblock %}
