{% extends 'base.html' %}
{% block content %}

<h2>Eliminar Activo</h2>
<p>¿Estás seguro de que deseas eliminar el activo <strong>{{activo.nombre}}</strong> ({{activo.ip_address}})?</p>
<p style="color: var(--danger-color);">Esta acción no se puede deshacer.</p>

<form method="POST">
    {% csrf_token %}
    <input type="submit" value="Eliminar" class="btn btn-danger">
    <a href="{% url 'detalle_activo' activo.id %}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
