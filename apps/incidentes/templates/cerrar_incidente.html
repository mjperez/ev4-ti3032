{% extends 'base.html' %}
{% block content %}

<h2>Generar Reporte de Cierre - Incidente: {{incidente.titulo}}</h2>

{% if error %}
<div class="alert alert-danger" style="color: red; margin-bottom: 1rem;">
    {{ error }}
</div>
{% endif %}

<form method="POST" action="{% url 'cerrar_incidente_view' incidente.id %}" class="custom-form">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="analista">Analista que Emite el Reporte</label>
        <select name="analista" id="analista" required class="form-control">
            <option value="">-- Seleccione Analista --</option>
            {% for a in analistas %}
            <option value="{{ a.id }}">{{ a.nombre }} ({{a.rol}})</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="resumen">Resumen Ejecutivo</label>
        <textarea name="resumen" id="resumen" rows="4" class="form-control" placeholder="Describa brevemente los hallazgos y el impacto..." required></textarea>
    </div>

    <div class="form-group">
        <label for="conclusiones">Conclusiones y Recomendaciones</label>
        <textarea name="conclusiones" id="conclusiones" rows="4" class="form-control" placeholder="Lecciones aprendidas, medidas correctivas futuras..."></textarea>
    </div>

    <div class="button-group" style="margin-top: 1rem;">
        <button type="submit" class="btn btn-danger">Cerrar Incidente y Generar Reporte</button>
        <a href="{% url 'detalle_incidente' incidente.id %}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>

{% endblock %}
