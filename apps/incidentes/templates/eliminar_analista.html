{% extends 'base.html' %}
{% block content %}

<h2>Eliminar Analista</h2>
<p>¿Estás seguro de que deseas eliminar al analista <strong>{{analista.nombre}}</strong> ({{analista.email}})?</p>
<p style="color: var(--danger-color);">Esta acción no se puede deshacer.</p>

<form method="POST">
    {% csrf_token %}
    <input type="submit" value="Eliminar" class="btn btn-danger">
    <a href="{% url 'detalle_analista' analista.id %}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
