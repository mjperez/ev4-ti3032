{% extends 'base.html' %}
{% block content %}

<h2>Agregar Evidencia al Incidente: {{incidente.titulo}}</h2>

{% if error %}
<div class="alert alert-danger" style="color: red; margin-bottom: 1rem;">
    {{ error }}
</div>
{% endif %}

<form method="POST" action="{% url 'agregar_evidencia' incidente.id %}" class="custom-form">
    {% csrf_token %}
    <div class="form-group">
        <label for="tipo">Tipo de Evidencia</label>
        <select name="tipo" id="tipo" required class="form-control">
            <option value="">-- Seleccione Tipo --</option>
            {% for t in tipos_evidencia %}
            <option value="{{ t }}">{{ t|capfirst }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="descripcion">Descripción</label>
        <textarea name="descripcion" id="descripcion" rows="3" class="form-control" required></textarea>
    </div>

    <div class="form-group">
        <label for="valor">Contenido/Valor (ej: hash, log)</label>
        <textarea name="valor" id="valor" rows="4" class="form-control" placeholder="Pegue la evidencia aquí..."></textarea>
    </div>

    <div class="button-group" style="margin-top: 1rem;">
        <button type="submit" class="btn btn-primary">Agregar Evidencia</button>
        <a href="{% url 'detalle_incidente' incidente.id %}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>

{% endblock %}
